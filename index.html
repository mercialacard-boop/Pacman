<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#050508">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PAC-MAN</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none}
body{background:#050508;display:flex;flex-direction:column;align-items:center;
  justify-content:center;font-family:'Press Start 2P',monospace;color:#fff}

/* == Main layout == */
#wrapper{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;width:100%;height:100%;
}
#title{font-size:clamp(14px,4vw,26px);color:#FFD700;
  text-shadow:0 0 10px #FFD700,0 0 30px #e6a800;
  margin-bottom:3px;letter-spacing:3px}
#sub{font-size:clamp(5px,1.2vw,7px);color:#555;margin-bottom:6px;letter-spacing:3px}
#hud{display:flex;gap:clamp(12px,3vw,30px);margin-bottom:5px;
  font-size:clamp(6px,1.5vw,9px);color:#FFD700}
canvas{
  border:2px solid #000066;
  box-shadow:0 0 18px #FFD70022,0 0 40px #00008822;
  display:block;
  /* canvas is scaled via CSS to fit screen */
  image-rendering:pixelated;
}
#msg{margin-top:6px;font-size:clamp(7px,1.8vw,11px);color:#FFD700;
  text-shadow:0 0 8px #FFD700;min-height:16px;text-align:center;letter-spacing:2px}
#ctrl{margin-top:4px;font-size:clamp(4px,1vw,6px);color:#333;text-align:center}
#touch-hint{display:none;margin-top:6px;font-size:10px;color:rgba(0,255,136,0.45);letter-spacing:2px;text-align:center}

</style>
</head>
<body>

<div id="wrapper">
  <div id="title">PAC-MAN</div>
  <div id="sub">a classic arcade game</div>
  <div id="hud">
    <span>SCORE: <span id="SC">0</span></span>
    <span>LIVES: <span id="LV">3</span></span>
    <span>LEVEL: <span id="LL">1</span></span>
  </div>
  <canvas id="cv" width="560" height="620"></canvas>
  <div id="msg">PRESS ENTER TO START</div>
  <div id="ctrl">WASD / ARROW KEYS | ENTER = START</div>
  <div id="touch-hint">SWIPE TO MOVE | TAP TO START</div>
</div>

<script>
// ==================================================
//  DEVICE DETECTION & RESPONSIVE SCALING
// ==================================================
var isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
var CANVAS_W = 560, CANVAS_H = 620;

function scaleCanvas() {
  var vw = window.innerWidth;
  var vh = window.innerHeight;

  // Show/hide hint text
  document.getElementById('ctrl').style.display       = isTouch ? 'none'  : 'block';
  document.getElementById('touch-hint').style.display = isTouch ? 'block' : 'none';

  // On mobile: canvas fills as much of the screen as possible.
  // Reserve only a small strip for HUD + title (top) and msg (bottom).
  var reservedH = 90; // px for title+sub+hud top + msg bottom
  var maxW = vw * 0.99;
  var maxH = (vh - reservedH);

  var scale = Math.min(maxW / CANVAS_W, maxH / CANVAS_H);
  // Desktop: don't upscale above native
  if (!isTouch) scale = Math.min(scale, 1);

  var cv = document.getElementById('cv');
  cv.style.width  = Math.floor(CANVAS_W * scale) + 'px';
  cv.style.height = Math.floor(CANVAS_H * scale) + 'px';
}

window.addEventListener('resize', scaleCanvas);
window.addEventListener('orientationchange', function(){ setTimeout(scaleCanvas, 150); });
scaleCanvas();

// ==================================================
//  GAME ENGINE
// ==================================================
var cv  = document.getElementById('cv');
var ctx = cv.getContext('2d');
var TS  = 20;
var NC  = 28;
var NR  = 31;

var RAW = [
  'WWWWWWWWWWWWWWWWWWWWWWWWWWWW',
  'W............WW............W',
  'W.WWWW.WWWWW.WW.WWWWW.WWWW.W',
  'WoWWWW.WWWWW.WW.WWWWW.WWWWoW',
  'W.WWWW.WWWWW.WW.WWWWW.WWWW.W',
  'W..........................W',
  'W.WWWW.WW.WWWWWWWW.WW.WWWW.W',
  'W.WWWW.WW.WWWWWWWW.WW.WWWW.W',
  'W......WW....WW....WW......W',
  'WWWWWW.WWWWW.WW.WWWWW.WWWWWW',
  'WWWWWW.WWWWW.WW.WWWWW.WWWWWW',
  'WWWWWW.WW          WW.WWWWWW',
  'WWWWWW.WW WWW--WWW WW.WWWWWW',
  'WWWWWW.WW W      W WW.WWWWWW',
  '      .   W      W   .      ',
  'WWWWWW.WW W      W WW.WWWWWW',
  'WWWWWW.WW WWWWWWWW WW.WWWWWW',
  'WWWWWW.WW          WW.WWWWWW',
  'WWWWWW.WW.WWWWWWWW.WW.WWWWWW',
  'WWWWWW.WW.WWWWWWWW.WW.WWWWWW',
  'W............WW............W',
  'W.WWWW.WWWWW.WW.WWWWW.WWWW.W',
  'W.WWWW.WWWWW.WW.WWWWW.WWWW.W',
  'Wo..WW................WW..oW',
  'WWW.WW.WW.WWWWWWWW.WW.WW.WWW',
  'WWW.WW.WW.WWWWWWWW.WW.WW.WWW',
  'W......WW....WW....WW......W',
  'W.WWWWWWWWWW.WW.WWWWWWWWWW.W',
  'W.WWWWWWWWWW.WW.WWWWWWWWWW.W',
  'W..........................W',
  'WWWWWWWWWWWWWWWWWWWWWWWWWWWW'
];

var GRID = [];
var DOTS = [];
var SYRS = [];

function buildMap() {
  var i, r, c, ch, row, hasDot, idx, pool, s;
  GRID = []; DOTS = []; SYRS = [];
  for (r = 0; r < NR; r++) {
    GRID[r] = [];
    row = RAW[r] || '';
    for (c = 0; c < NC; c++) {
      ch = (c < row.length) ? row[c] : 'W';
      GRID[r][c] = (ch === 'W') ? 1 : (ch === '-') ? 2 : 0;
      if (ch === '.') DOTS.push({c:c, r:r, big:false, eaten:false});
      if (ch === 'o') DOTS.push({c:c, r:r, big:true,  eaten:false});
    }
  }
  pool = [];
  for (r = 0; r < NR; r++) {
    for (c = 0; c < NC; c++) {
      if (GRID[r][c] === 0) {
        hasDot = false;
        for (i = 0; i < DOTS.length; i++) {
          if (DOTS[i].c === c && DOTS[i].r === r) { hasDot = true; break; }
        }
        if (!hasDot) pool.push({c:c, r:r});
      }
    }
  }
  for (i = 0; i < 4 && pool.length > 0; i++) {
    idx = Math.floor(Math.random() * pool.length);
    s   = pool.splice(idx, 1)[0];
    SYRS.push({c:s.c, r:s.r, eaten:false});
  }
}

function isWall(c, r) {
  if (r < 0 || r >= NR) return true;
  if (c < 0) c = NC - 1;
  if (c >= NC) c = 0;
  return GRID[r][c] === 1;
}
function isGWall(c, r) {
  if (r < 0 || r >= NR) return true;
  if (c < 0 || c >= NC) return false;
  return GRID[r][c] === 1 || GRID[r][c] === 2;
}

var NONE = {dc:0, dr:0};
var UP   = {dc:0, dr:-1};
var DN   = {dc:0, dr:1};
var LT   = {dc:-1, dr:0};
var RT   = {dc:1,  dr:0};
var A4   = [UP, DN, LT, RT];

var STATE  = 'start';
var score  = 0, lives = 3, level = 1;
var fright = 0, dieT = 0;
var rafId  = null, boostTO = null;
var PL     = {};
var COPS   = [];

var COP_COL   = ['#FF0000','#FFB8FF','#FFB852','#00FFFF'];
var COP_START = [{c:13,r:11},{c:11,r:14},{c:13,r:14},{c:15,r:14}];

function resetPlayer() {
  PL = {c:13, r:23, px:13*TS+TS/2, py:23*TS+TS/2,
        dir:NONE, want:NONE, spd:2, mouth:0.05, mouthD:1, alive:true};
}

function resetCops(spd) {
  var i, s;
  COPS = [];
  for (i = 0; i < 4; i++) {
    s = COP_START[i];
    COPS.push({c:s.c, r:s.r, px:s.c*TS+TS/2, py:s.r*TS+TS/2,
               col:COP_COL[i], dir:DN, spd:spd,
               mode:'house', houseT:i*120, fright:false, eaten:false});
  }
}

function hud() {
  document.getElementById('SC').textContent = score;
  document.getElementById('LV').textContent = lives;
  document.getElementById('LL').textContent = level;
}
function msg(t) { document.getElementById('msg').textContent = t; }

// == UPDATE ========================================
function update() {
  var i;
  if (STATE === 'die') {
    dieT--;
    if (dieT <= 0) {
      if (lives <= 0) { STATE='over'; msg('GAME OVER -- ENTER TO RESTART'); }
      else { respawn(); }
    }
    return;
  }
  if (STATE !== 'play') return;
  if (fright > 0) {
    fright--;
    if (fright === 0) for (i=0;i<COPS.length;i++) COPS[i].fright = false;
  }
  tickPlayer();
  for (i=0;i<COPS.length;i++) tickCop(COPS[i]);
  checkHits();
}

function tickPlayer() {
  var tx, ty, dx, dy, dist, nc, nr;
  if (!PL.alive) return;
  PL.mouth += 0.05 * PL.mouthD;
  if (PL.mouth > 0.25) PL.mouthD = -1;
  if (PL.mouth < 0.02) PL.mouthD =  1;
  tx = PL.c * TS + TS/2;
  ty = PL.r * TS + TS/2;
  dx = tx - PL.px;
  dy = ty - PL.py;
  dist = Math.sqrt(dx*dx + dy*dy);
  if (dist > PL.spd) {
    PL.px += (dx/dist)*PL.spd;
    PL.py += (dy/dist)*PL.spd;
    return;
  }
  PL.px = tx; PL.py = ty;
  if (PL.want !== NONE) {
    nc = PL.c + PL.want.dc;
    nr = PL.r + PL.want.dr;
    if (!isWall(nc, nr)) { PL.dir = PL.want; PL.want = NONE; }
  }
  if (PL.dir !== NONE) {
    nc = PL.c + PL.dir.dc;
    nr = PL.r + PL.dir.dr;
    if (!isWall(nc, nr)) {
      PL.c = ((nc % NC) + NC) % NC;
      PL.r = nr;
    }
  }
  collect(PL.c, PL.r);
}

function collect(c, r) {
  var i, d, s, all;
  for (i=0;i<DOTS.length;i++) {
    d = DOTS[i];
    if (!d.eaten && d.c===c && d.r===r) {
      d.eaten = true;
      score += d.big ? 50 : 10; hud();
      if (d.big) {
        fright = 380;
        for (var j=0;j<COPS.length;j++) if (!COPS[j].eaten) COPS[j].fright=true;
      }
    }
  }
  for (i=0;i<SYRS.length;i++) {
    s = SYRS[i];
    if (!s.eaten && s.c===c && s.r===r) {
      s.eaten = true; score+=200; hud();
      fright = Math.max(fright,500);
      for (var j=0;j<COPS.length;j++) if (!COPS[j].eaten) COPS[j].fright=true;
      if (boostTO) clearTimeout(boostTO);
      PL.spd=3;
      boostTO=setTimeout(function(){PL.spd=2;boostTO=null;},5000);
      msg('POWER UP! +200');
      setTimeout(function(){msg('');},1800);
    }
  }
  all=true;
  for (i=0;i<DOTS.length;i++) if (!DOTS[i].eaten){all=false;break;}
  if (all) {
    STATE='lvl'; msg('LEVEL UP!');
    setTimeout(function(){
      level++;
      buildMap(); buildWallTexture(); resetPlayer();
      var sp=Math.min(1.7+level*0.1,2.4);
      resetCops(sp);
      STATE='play'; msg(''); hud();
    },2000);
  }
}

function tickCop(cop) {
  var tx, ty, dx, dy, dist, spd, rev, valid, i, d, nc, nr, dd, best, chosen;
  if (cop.mode==='house') {
    cop.houseT--;
    cop.py += cop.dir.dr * 0.7;
    if (cop.py > 15*TS+TS/2) cop.dir=UP;
    if (cop.py < 13*TS+TS/2) cop.dir=DN;
    if (cop.houseT<=0) {
      cop.mode='exit'; cop.c=13; cop.r=13;
      cop.px=13*TS+TS/2; cop.py=13*TS+TS/2; cop.dir=UP;
    }
    return;
  }
  if (cop.mode==='exit') {
    cop.py -= 2;
    cop.r = Math.round((cop.py-TS/2)/TS);
    if (cop.py <= 11*TS+TS/2) {
      cop.py=11*TS+TS/2; cop.r=11;
      cop.px=13*TS+TS/2; cop.c=13;
      cop.mode='chase'; cop.dir=LT;
    }
    return;
  }
  spd = cop.eaten ? 2.8 : (cop.fright ? cop.spd*0.5 : cop.spd);
  tx = cop.c*TS+TS/2; ty = cop.r*TS+TS/2;
  dx = tx-cop.px; dy=ty-cop.py;
  dist=Math.sqrt(dx*dx+dy*dy);
  if (dist > spd) {
    cop.px += (dx/dist)*spd;
    cop.py += (dy/dist)*spd;
    return;
  }
  cop.px=tx; cop.py=ty;
  cop.fright = (fright>0 && !cop.eaten);
  if (cop.eaten && cop.c===13 && cop.r===14) {
    cop.eaten=false; cop.fright=false;
    cop.mode='house'; cop.houseT=80; cop.dir=DN;
    return;
  }
  rev={dc:-cop.dir.dc, dr:-cop.dir.dr};
  valid=[];
  for (i=0;i<A4.length;i++) {
    d=A4[i];
    if (d.dc===rev.dc && d.dr===rev.dr) continue;
    nc=cop.c+d.dc; nr=cop.r+d.dr;
    if (!(cop.eaten?isWall(nc,nr):isGWall(nc,nr))) valid.push(d);
  }
  if (valid.length===0) valid.push(rev);
  if (cop.fright) {
    chosen=valid[Math.floor(Math.random()*valid.length)];
  } else {
    var tc=cop.eaten?13:PL.c;
    var tr=cop.eaten?14:PL.r;
    best=1e9;
    for (i=0;i<valid.length;i++) {
      nc=cop.c+valid[i].dc; nr=cop.r+valid[i].dr;
      dd=(nc-tc)*(nc-tc)+(nr-tr)*(nr-tr);
      if (dd<best){best=dd;chosen=valid[i];}
    }
  }
  cop.dir=chosen;
  cop.c+=chosen.dc;
  cop.r+=chosen.dr;
}

function checkHits() {
  var i, cop, dx, dy, dist;
  if (!PL.alive) return;
  for (i=0;i<COPS.length;i++) {
    cop=COPS[i];
    if (cop.mode!=='chase') continue;
    dx=PL.px-cop.px; dy=PL.py-cop.py;
    dist=Math.sqrt(dx*dx+dy*dy);
    if (dist < TS*0.78) {
      if (cop.fright && !cop.eaten) {
        cop.eaten=true; cop.fright=false;
        score+=200; hud();
        msg('GHOST EATEN! +200');
        setTimeout(function(){msg('');},1200);
      } else if (!cop.eaten) {
        PL.alive=false; lives--; hud();
        dieT=80; STATE='die';
        msg(lives<=0?'GAME OVER':'BUSTED!');
      }
    }
  }
}

function respawn() {
  var spd=COPS.length>0?COPS[0].spd:1.7;
  if (boostTO){clearTimeout(boostTO);boostTO=null;}
  resetPlayer(); resetCops(spd);
  fright=0; STATE='play'; msg('');
}

// == DRAW ==========================================
var wallCanvas = document.createElement('canvas');
wallCanvas.width = 560; wallCanvas.height = 620;
var wctx = wallCanvas.getContext('2d');

function buildWallTexture() {
  var r, c, x, y, top, bot, lft, rgt, placed, tags, tagColors;
  wctx.clearRect(0,0,560,620);
  for (r=0;r<NR;r++) for (c=0;c<NC;c++) {
    x=c*TS; y=r*TS;
    if (GRID[r][c]===1) {
      wctx.fillStyle='#0d0d14'; wctx.fillRect(x,y,TS,TS);
      wctx.strokeStyle='rgba(255,255,255,0.04)';
      wctx.lineWidth=0.5;
      wctx.beginPath();
      wctx.moveTo(x,y+6+(c%2)*4); wctx.lineTo(x+TS,y+6+(c%2)*4);
      wctx.moveTo(x+(c%3)*6,y);   wctx.lineTo(x+(c%3)*6,y+TS);
      wctx.stroke();
      top = (r>0    && GRID[r-1][c]!==1);
      bot = (r<NR-1 && GRID[r+1][c]!==1);
      lft = (c>0    && GRID[r][c-1]!==1);
      rgt = (c<NC-1 && GRID[r][c+1]!==1);
      if (top||bot||lft||rgt) {
        wctx.lineWidth=2.5;
        wctx.strokeStyle='#0033ff';
        wctx.shadowColor='#0055ff'; wctx.shadowBlur=8;
        if (top){wctx.beginPath();wctx.moveTo(x,y+1.5);wctx.lineTo(x+TS,y+1.5);wctx.stroke();}
        if (bot){wctx.beginPath();wctx.moveTo(x,y+TS-1.5);wctx.lineTo(x+TS,y+TS-1.5);wctx.stroke();}
        if (lft){wctx.beginPath();wctx.moveTo(x+1.5,y);wctx.lineTo(x+1.5,y+TS);wctx.stroke();}
        if (rgt){wctx.beginPath();wctx.moveTo(x+TS-1.5,y);wctx.lineTo(x+TS-1.5,y+TS);wctx.stroke();}
        wctx.shadowBlur=0;
      }
    } else if (GRID[r][c]===2) {
      wctx.fillStyle='#ff44aa';
      wctx.shadowColor='#ff44aa'; wctx.shadowBlur=5;
      wctx.fillRect(x+1,y+8,TS-2,3);
      wctx.shadowBlur=0;
    }
  }
  tags = ['SCORE','PLAY','GAME','OVER','LEVEL','BONUS'];
  tagColors = ['#ff3300','#ffcc00','#00ffcc','#ff00cc','#88ff00'];
  placed=0;
  for (r=2; r<NR-2 && placed<6; r++) {
    for (c=2; c<NC-2 && placed<6; c++) {
      if (GRID[r][c]===1 && GRID[r][c+1]===1 && GRID[r][c+2]===1 && Math.random()<0.025) {
        wctx.fillStyle = '#ffffff';
        wctx.globalAlpha = 0.15;
        wctx.font = 'bold 6px Arial';
        wctx.textAlign = 'center';
        wctx.fillText(tags[placed], (c+1)*TS, (r+0.7)*TS);
        wctx.globalAlpha = 1;
        placed++;
      }
    }
  }
}

function draw() {
  var i;
  ctx.fillStyle='#08080f'; ctx.fillRect(0,0,cv.width,cv.height);
  for (i=0;i<60;i++) {
    ctx.fillStyle='rgba(255,255,255,0.012)';
    ctx.fillRect(Math.floor((i*137)%560),Math.floor((i*97)%620),(i%3)+1,1);
  }
  ctx.drawImage(wallCanvas,0,0);
  drawDots(); drawSyrs();
  for (i=0;i<COPS.length;i++) drawCop(COPS[i]);
  drawPlayer();
}

function drawDots() {
  var i, d, x, y, pulse=0.55+0.45*Math.sin(Date.now()/260);
  for (i=0;i<DOTS.length;i++) {
    d=DOTS[i]; if (d.eaten) continue;
    x=d.c*TS+TS/2; y=d.r*TS+TS/2;
    if (d.big) {
      ctx.save(); ctx.globalAlpha=0.85+0.15*pulse;
      ctx.shadowColor='#eeeeff'; ctx.shadowBlur=10;
      ctx.fillStyle='rgba(0,0,0,0.4)';
      ctx.beginPath(); ctx.ellipse(x+1,y+4,7,2.5,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#c8c8d4';
      ctx.beginPath(); ctx.ellipse(x,y+2,7,3.5,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#dddde8';
      ctx.beginPath(); ctx.ellipse(x-0.5,y,5.5,2.8,-0.15,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#f5f5ff';
      ctx.beginPath(); ctx.ellipse(x-1,y-1.5,3.5,2,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffffff'; ctx.globalAlpha=pulse;
      ctx.beginPath(); ctx.arc(x-2,y-2.5,1,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+2.5,y-0.5,0.6,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0; ctx.restore();
    } else {
      ctx.fillStyle='#b8b8c8';
      ctx.shadowColor='rgba(255,255,255,0.5)'; ctx.shadowBlur=3;
      ctx.beginPath(); ctx.ellipse(x,y+0.5,2.5,1.2,0,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    }
  }
}

function drawSyrs() {
  var i, s, x, y, bob;
  for (i=0;i<SYRS.length;i++) {
    s=SYRS[i]; if (s.eaten) continue;
    x=s.c*TS+TS/2; y=s.r*TS+TS/2;
    bob = Math.sin(Date.now()/350+i)*2;
    ctx.save(); ctx.translate(x, y+bob);
    // Cherry bonus fruit
    ctx.shadowColor='#cc0000'; ctx.shadowBlur=6;
    ctx.fillStyle='#cc0000';
    ctx.beginPath(); ctx.arc(-3, 2, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 4, 3, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff5555';
    ctx.beginPath(); ctx.arc(-4, 0, 2, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle='#228800'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(-3,-3); ctx.bezierCurveTo(-3,-8,4,-8,4,-2); ctx.stroke();
    ctx.restore();
  }
}

function drawPlayer() {
  if (!PL.alive && dieT<=0) return;

  ctx.save();
  ctx.translate(PL.px, PL.py);

  if (PL.dir===LT) ctx.rotate(Math.PI);
  else if (PL.dir===UP) ctx.rotate(-Math.PI/2);
  else if (PL.dir===DN) ctx.rotate(Math.PI/2);

  var mouth = 0.15 + Math.abs(Math.sin(Date.now()/90))*0.45;

  if (!PL.alive) {
    var prog=(80-dieT)/80;
    ctx.rotate(prog*Math.PI*4);
    ctx.globalAlpha=1-prog;
    ctx.scale(1-prog*0.9,1-prog*0.9);
  }

  ctx.fillStyle='#FFD700';
  ctx.shadowColor='#FFD700';
  ctx.shadowBlur=12;

  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.arc(0,0,10,mouth,Math.PI*2-mouth);
  ctx.closePath();
  ctx.fill();

  ctx.shadowBlur=0;
  ctx.restore();
}

function drawCop(cop) {
  var bl, fl;
  ctx.save(); ctx.translate(cop.px, cop.py);
  if (cop.eaten) {
    // Just eyes drifting home
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(-3,-2,3,4,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( 3,-2,3,4,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#00f';
    ctx.beginPath(); ctx.ellipse(-3,-1,1.5,2.5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( 3,-1,1.5,2.5,0,0,Math.PI*2); ctx.fill();
    ctx.restore(); return;
  }
  if (cop.fright) {
    fl = fright<120 && Math.floor(Date.now()/180)%2;
    var skid = (fright<120 && !fl) ? Math.sin(Date.now()/60)*3 : 0;
    ctx.translate(skid,0);
    ctx.fillStyle=fl?'#555':'#1a1a22'; ctx.fillRect(-9,-5,18,11);
    ctx.fillStyle=fl?'#777':'#2a2a33'; ctx.fillRect(-5,-4,10,6);
    ctx.fillStyle='#111'; ctx.fillRect(-5,-9,10,5);
    ctx.fillStyle='#300'; ctx.beginPath(); ctx.arc(-3,-8,2.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#003'; ctx.beginPath(); ctx.arc(3,-8,2.5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(-5,-4); ctx.lineTo(5,2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5,-4); ctx.lineTo(-5,2); ctx.stroke();
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.arc(-7,6,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7,6,3,0,Math.PI*2); ctx.fill();
    ctx.restore(); return;
  }
  // Classic ghost body shape
  ctx.fillStyle = cop.col;
  ctx.shadowColor = cop.col; ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(0,-3,9,Math.PI,0);
  ctx.lineTo(9,7);
  ctx.lineTo(6,4); ctx.lineTo(3,7); ctx.lineTo(0,4);
  ctx.lineTo(-3,7); ctx.lineTo(-6,4); ctx.lineTo(-9,7);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0;
  // Eyes
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(-3,-2,3,4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 3,-2,3,4,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#00f';
  ctx.beginPath(); ctx.ellipse(-3,-1,1.5,2.5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 3,-1,1.5,2.5,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// == LOOP ==========================================
function loop() { update(); draw(); rafId=requestAnimationFrame(loop); }

function fullReset() {
  score=0; lives=3; level=1;
  if (boostTO){clearTimeout(boostTO);boostTO=null;}
  buildMap(); buildWallTexture(); resetPlayer(); resetCops(1.7);
  fright=0; dieT=0; hud(); msg('');
  STATE='play';
  if (rafId) cancelAnimationFrame(rafId);
  rafId=requestAnimationFrame(loop);
}

// == KEYBOARD INPUT ================================
document.addEventListener('keydown',function(e){
  if (e.key==='Enter'||e.key===' ') {
    if (STATE==='start'||STATE==='over') { fullReset(); return; }
  }
  if (STATE!=='play') return;
  if (e.key==='ArrowUp'   ||e.key==='w'||e.key==='W'){PL.want=UP;e.preventDefault();}
  if (e.key==='ArrowDown' ||e.key==='s'||e.key==='S'){PL.want=DN;e.preventDefault();}
  if (e.key==='ArrowLeft' ||e.key==='a'||e.key==='A'){PL.want=LT;e.preventDefault();}
  if (e.key==='ArrowRight'||e.key==='d'||e.key==='D'){PL.want=RT;e.preventDefault();}
});

// == TOUCH INPUT ===================================
// Strategy: track finger from touchstart to touchmove.
// Direction is committed as soon as the finger moves >= THRESHOLD px,
// so it feels instant -- no need to lift finger first.
// A short tap (no swipe) starts/restarts the game.
var SWIPE_THRESHOLD = 18; // px to commit direction
var touchX0 = 0, touchY0 = 0, touchDirLocked = false;

document.addEventListener('touchstart', function(e) {
  e.preventDefault();
  touchX0 = e.touches[0].clientX;
  touchY0 = e.touches[0].clientY;
  touchDirLocked = false;
}, {passive: false});

document.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (touchDirLocked) return;
  if (STATE !== 'play') return;

  var dx = e.touches[0].clientX - touchX0;
  var dy = e.touches[0].clientY - touchY0;
  var adx = Math.abs(dx), ady = Math.abs(dy);

  if (adx < SWIPE_THRESHOLD && ady < SWIPE_THRESHOLD) return; // not enough movement yet

  touchDirLocked = true; // commit direction, ignore rest of this stroke
  if (adx > ady) PL.want = (dx > 0) ? RT : LT;
  else           PL.want = (dy > 0) ? DN : UP;
}, {passive: false});

document.addEventListener('touchend', function(e) {
  e.preventDefault();
  // If finger barely moved: treat as tap = start/restart
  var dx = e.changedTouches[0].clientX - touchX0;
  var dy = e.changedTouches[0].clientY - touchY0;
  if (Math.abs(dx) < SWIPE_THRESHOLD && Math.abs(dy) < SWIPE_THRESHOLD) {
    if (STATE === 'start' || STATE === 'over') fullReset();
  }
}, {passive: false});

// == BOOT ==========================================
buildMap(); buildWallTexture(); resetPlayer(); resetCops(1.7); hud(); draw();
</script>
